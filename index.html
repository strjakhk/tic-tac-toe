<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic tac toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tic Tac Toe</h1>
    </header>
    <main>
        <div class="left-player-name">
            <span data-user-id=0>player1</span>
        </div>
        <div class="left-player-info">
            <span id="player-1-mark">O</span>
            <span id="player-2-score">0</span>
        </div>
        <div class="right-player-name">
            <span data-user-id=1>player2</span>
        </div>
        <div class="right-player-info">
            <span id="player-2-mark">X</span>
            <span id="player-2-score">0</span>
        </div>
        <div class="board">

        </div>
        <div class="start">
            <button type="button" id="start">start</button>
        </div>
    </main>
    <footer>

    </footer>

<script src="./main.js"></script>
</body>
</html>
